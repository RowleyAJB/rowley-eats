<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rowley Eats — Food recommendations from Rowley</title>
  <meta name="description" content="Rowley's personal recommendations for places to eat across the Wirral and Liverpool, with notes on what to order.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />

  <link rel="stylesheet" href="style.css?v=3">
</head>
<body>

  <header class="topbar">
    <div class="brand">
      <img src="assets/logo.png" alt="Rowley Eats">
    </div>
    <nav>
      <a href="index.html" class="active">Spots</a>
      <a href="recommend.html">Recommend a place</a>
    </nav>
  </header>

  <section class="hero">
    <h1>Places I'd actually recommend</h1>

  <div class="filters" id="filters">
    <button class="chip active" data-filter-type="city" data-value="all">All</button>
  </div>

  <footer>
    Built by Rowley. Got a recommendation of your own? Send it over and it might end up on here.
  </footer>

  <script src="data.js?v=3"></script>
  <script src="app.js?v=3"></script>
